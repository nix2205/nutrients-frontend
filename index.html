<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriLens — Indian Food Recognition</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ============================================================
     CONFIG — change this one line to your Render backend URL
     ============================================================ -->
<script>
  window.NUTRILENS_API_URL = "";
</script>
<!-- ============================================================ -->

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --saffron:#FF6B35;--saffron-dark:#E55A25;
  --leaf:#2D6A4F;--leaf-light:#52B788;
  --cream:#FFFBF5;--ink:#1A1A2E;--ink-mid:#3D3D5C;--ink-light:#8888AA;
  --card:#FFFFFF;--border:#E8E0D5;
  --shadow:0 4px 24px rgba(26,26,46,.08);--shadow-lg:0 12px 48px rgba(26,26,46,.14);
  --r:16px;--rs:10px
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(255,107,53,.05) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(82,183,136,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
.hdr{padding:20px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(255,251,245,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--saffron),#FF9563);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px}
.logo-text span{color:var(--saffron)}
.hdr-badge{font-size:11px;font-weight:500;color:var(--ink-light);background:var(--border);padding:4px 12px;border-radius:20px;letter-spacing:.5px}
.hero{text-align:center;padding:60px 40px 40px;max-width:680px;margin:0 auto}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--leaf);background:rgba(82,183,136,.12);border:1px solid rgba(82,183,136,.25);padding:5px 14px;border-radius:20px;margin-bottom:20px;letter-spacing:.5px}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(32px,5vw,52px);font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:16px}
.hero h1 em{font-style:normal;color:var(--saffron)}
.hero p{font-size:16px;line-height:1.7;color:var(--ink-mid);font-weight:300}
.section{max-width:780px;margin:0 auto;padding:0 40px 40px}
.drop{border:2px dashed var(--border);border-radius:var(--r);padding:56px 40px;text-align:center;cursor:pointer;transition:all .25s;background:var(--card)}
.drop:hover,.drop.drag{border-color:var(--saffron);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.drop-icon{width:64px;height:64px;margin:0 auto 18px;background:linear-gradient(135deg,rgba(255,107,53,.1),rgba(247,197,159,.2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px}
.drop-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--ink-light);margin-bottom:20px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:11px 26px;background:var(--saffron);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border:none;border-radius:50px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(255,107,53,.3)}
.btn-primary:hover{background:var(--saffron-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,107,53,.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-green{background:var(--leaf)}.btn-green:hover{background:var(--leaf-light)}
.btn-ghost{background:none;border:none;color:var(--saffron);font-size:13px;font-weight:500;cursor:pointer;text-decoration:underline;padding:0}
.controls{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:var(--shadow);margin-bottom:8px}
.ctrl-label{font-size:13px;font-weight:500;color:var(--ink-mid);white-space:nowrap}
.ctrl-label strong{color:var(--saffron);font-family:'Syne',sans-serif}
input[type=range]{flex:1;min-width:80px;accent-color:var(--saffron)}
.pgrid{max-width:1080px;margin:0 auto;padding:0 40px 72px;display:grid;grid-template-columns:1fr 400px;gap:24px;align-items:start}
@media(max-width:860px){.pgrid{grid-template-columns:1fr}}
.img-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.img-card img{width:100%;display:block;object-fit:contain;max-height:500px;background:#f5f5f5}
.img-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.img-footer span{font-size:13px;color:var(--ink-light)}
.rpanel{display:flex;flex-direction:column;gap:14px}
.total-card{background:linear-gradient(135deg,#1A1A2E,#2D2D4E);color:#fff;border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
.total-lbl{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;opacity:.55;margin-bottom:14px}
.total-kcal{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;line-height:1;color:#F7C59F}
.total-kcal span{font-size:16px;font-weight:400;opacity:.6}
.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
.macro{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 8px;text-align:center}
.macro-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#52B788}
.macro-lbl{font-size:11px;opacity:.55;margin-top:2px}
.dlist{display:flex;flex-direction:column;gap:10px}
.dcard{background:var(--card);border-radius:var(--rs);padding:14px;box-shadow:var(--shadow);border-left:4px solid var(--saffron);transition:transform .15s}
.dcard:hover{transform:translateX(2px)}
.dhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dname{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.dconf{font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;background:rgba(82,183,136,.12);color:var(--leaf)}
.dnuts{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.npill{background:var(--cream);border-radius:7px;padding:5px 6px;text-align:center}
.npill-v{font-size:12px;font-weight:600}
.npill-l{font-size:10px;color:var(--ink-light);margin-top:1px}
.dportion{font-size:11px;color:var(--ink-light);margin-top:7px}
.dtop3{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);font-size:11px;color:var(--ink-light)}
.loading{display:flex;flex-direction:column;align-items:center;padding:72px 40px;gap:18px}
.spin{width:52px;height:52px;border:3px solid var(--border);border-top-color:var(--saffron);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.load-sub{font-size:13px;color:var(--ink-light);margin-top:-10px}
.errbox{background:#FFF5F5;border:1.5px solid #FFCCCC;border-radius:var(--rs);padding:18px;color:#C0392B;font-size:13px;line-height:1.6}
footer{text-align:center;padding:28px;font-size:12px;color:var(--ink-light);border-top:1px solid var(--border)}
footer a{color:var(--saffron);text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease forwards}
.fu1{animation:fadeUp .35s .1s ease both}
.fu2{animation:fadeUp .35s .2s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect} = React;

const API_URL = window.NUTRILENS_API_URL;

function App(){
  const [img,setImg]         = useState(null);
  const [fname,setFname]     = useState('');
  const [drag,setDrag]       = useState(false);
  const [loading,setLoading] = useState(false);
  const [results,setResults] = useState(null);
  const [error,setError]     = useState(null);
  const [thresh,setThresh]   = useState(0.55);
  const [apiOk,setApiOk]     = useState(null);
  const fileRef = useRef();

  useEffect(()=>{
    fetch(`/api/health`)
      .then(r=>r.ok?r.json():Promise.reject())
      .then(()=>setApiOk(true))
      .catch(()=>setApiOk(false));
  },[]);

  const handleFile = f => {
    if(!f||!f.type.startsWith('image/')) return;
    setFname(f.name); setResults(null); setError(null);
    const r=new FileReader();
    r.onload=e=>setImg(e.target.result);
    r.readAsDataURL(f);
  };

  const onDrop = useCallback(e=>{
    e.preventDefault(); setDrag(false);
    handleFile(e.dataTransfer.files[0]);
  },[]);

  const analyze = async()=>{
    if(!img) return;
    setLoading(true); setError(null); setResults(null);
    try{
      const resp = await fetch(`/api/predict`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({image:img,conf_thresh:thresh})
      });
      const data = await resp.json();
      if(!resp.ok||!data.success) throw new Error(data.error||'Prediction failed');
      setResults(data);
    }catch(e){
      setError(e.message);
    }finally{
      setLoading(false);
    }
  };

  const reset=()=>{setImg(null);setResults(null);setError(null);setFname('');};

  return (
    <div>
      <header className="hdr">
        <div className="logo">
          <div className="logo-icon">🍛</div>
          <div className="logo-text">Nutri<span>Lens</span></div>
        </div>
        <div className="hdr-badge">
          {apiOk===true?'🟢 API Connected':apiOk===false?'🔴 API Offline':'⏳ Checking...'}
        </div>
      </header>

      {!img&&(
        <section className="hero fu">
          <div className="pill">✦ Powered by EfficientNet-B0 + USDA FoodData Central</div>
          <h1>Identify <em>any</em> Indian food<br/>instantly</h1>
          <p>Upload a photo of your meal — single dish or full thali — and get instant food identification, portion estimates, and complete nutritional breakdown.</p>
        </section>
      )}

      {!img&&apiOk===false&&(
        <div style={{maxWidth:640,margin:'0 auto 16px',padding:'0 40px'}}>
          <div className="errbox">
            ⚠️ Cannot reach the API. The Render server may be waking up (takes ~30 sec on free tier). Try again in a moment.
          </div>
        </div>
      )}

      {!img&&(
        <section className="section fu1">
          <div
            className={`drop ${drag?'drag':''}`}
            onClick={()=>fileRef.current.click()}
            onDragOver={e=>{e.preventDefault();setDrag(true);}}
            onDragLeave={()=>setDrag(false)}
            onDrop={onDrop}
          >
            <div className="drop-icon">📸</div>
            <div className="drop-title">Drop your food photo here</div>
            <div className="drop-sub">Supports JPG, PNG, WEBP · Single dish or full thali</div>
            <button className="btn-primary" onClick={e=>{e.stopPropagation();fileRef.current.click();}}>
              Choose Image
            </button>
            <input ref={fileRef} type="file" accept="image/*" hidden onChange={e=>handleFile(e.target.files[0])}/>
          </div>
        </section>
      )}

      {img&&!loading&&(
        <div className="section fu" style={{paddingTop:28}}>
          <div className="controls">
            <span className="ctrl-label">Confidence: <strong>{Math.round(thresh*100)}%</strong></span>
            <input type="range" min="0.3" max="0.85" step="0.05" value={thresh} onChange={e=>setThresh(parseFloat(e.target.value))}/>
            <button className="btn-ghost" onClick={reset}>← New image</button>
            <button className="btn-primary btn-green" onClick={analyze} disabled={loading}>
              {results?'🔄 Re-analyze':'🔍 Analyze Food'}
            </button>
          </div>
          {error&&<div className="errbox" style={{marginTop:8}}><strong>Error:</strong> {error}</div>}
        </div>
      )}

      {loading&&(
        <div className="loading fu">
          <div className="spin"/>
          <div className="load-title">Analyzing your food...</div>
          <div className="load-sub">Running TTA detection + USDA nutrition lookup</div>
        </div>
      )}

      {results&&!loading&&(
        <div className="pgrid fu">
          <div className="img-card">
            <img src={results.annotated} alt="Food detection result"/>
            <div className="img-footer">
              <span>🍽 {results.detections.length} food{results.detections.length!==1?'s':''} detected · {results.model}</span>
              <button className="btn-ghost" onClick={reset}>New image</button>
            </div>
          </div>
          <div className="rpanel">
            <div className="total-card">
              <div className="total-lbl">Total Nutrition</div>
              <div className="total-kcal">{results.total_nutrition.calories} <span>kcal</span></div>
              <div className="macros">
                <div className="macro"><div className="macro-val">{results.total_nutrition.protein}g</div><div className="macro-lbl">Protein</div></div>
                <div className="macro"><div className="macro-val">{results.total_nutrition.carbs}g</div><div className="macro-lbl">Carbs</div></div>
                <div className="macro"><div className="macro-val">{results.total_nutrition.fat}g</div><div className="macro-lbl">Fat</div></div>
              </div>
            </div>
            <div className="dlist">
              {results.detections.map(d=>(
                <div key={d.id} className="dcard" style={{borderLeftColor:d.color}}>
                  <div className="dhead">
                    <div className="dname">{d.food_display}</div>
                    <div className="dconf">{d.confidence}%</div>
                  </div>
                  <div className="dnuts">
                    <div className="npill"><div className="npill-v">{d.nutrition.calories}</div><div className="npill-l">kcal</div></div>
                    <div className="npill"><div className="npill-v">{d.nutrition.protein}g</div><div className="npill-l">protein</div></div>
                    <div className="npill"><div className="npill-v">{d.nutrition.carbs}g</div><div className="npill-l">carbs</div></div>
                    <div className="npill"><div className="npill-v">{d.nutrition.fat}g</div><div className="npill-l">fat</div></div>
                  </div>
                  <div className="dportion">~{d.nutrition.portion_g}g estimated · {d.nutrition.source}</div>
                  <div className="dtop3">Top‑3: {d.top3.map(([n,c])=>`${n.replace(/_/g,' ')} ${c}%`).join(' · ')}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {img&&!results&&!loading&&(
        <div style={{maxWidth:600,margin:'0 auto',padding:'0 40px 40px'}} className="fu">
          <div className="img-card">
            <img src={img} alt="Uploaded" style={{maxHeight:380}}/>
            <div className="img-footer"><span>📄 {fname}</span></div>
          </div>
        </div>
      )}

      <footer>
        NutriLens · Khana Dataset (arXiv:2509.06006) ·
        Nutrition from <a href="https://fdc.nal.usda.gov" target="_blank">USDA FoodData Central</a>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
